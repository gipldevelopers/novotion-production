name: Frontend CI/CD

on:
  push:
    branches:
      - main

env:
  NODE_VERSION: "22"
  DEPLOY_PATH: "/home/ubuntu/apps/frontend"
  PM2_APP_NAME: "production"

jobs:
  build:
    name: Build app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js app
        run: npm run build

  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy frontend to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.AWS_PORT || 22 }}
          script_stop: true
          script: |
            echo "Go to frontend folder"
            cd ${{ env.DEPLOY_PATH }}

            echo "Fetch latest code"
            git fetch origin main
            git pull --ff-only origin main

            echo "Install dependencies"
            npm ci

            echo "Generate Prisma client"
            npx prisma generate

            echo "Build frontend"
            npm run build

            echo "Restart frontend"
            pm2 restart ${{ env.PM2_APP_NAME }}
            pm2 save

            echo "Frontend deployed successfully"
